repos:
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, -c, .yamllint.yml]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 'v10.4.1'
    hooks:
    -   id: eslint
        files: ^index.js$
        additional_dependencies:
        - globals@17.6.0
        - eslint@10.4.1
        - '@eslint/js@10.0.1'
        - '@eslint/eslintrc@3.3.5'
