version: 2.1
orbs:
  # We should periodically update this, last updated 2026-06-10
  node: circleci/node@7.2.1
jobs:
  build:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    steps:
      - checkout
      - node/install:
          install-yarn: true
          node-version: '24.16.0'
      - run: node --version
      - run: npm install
      - run: mkdir ~/my_test_artifacts
      - run: echo "This should point to root_artifact.md for commit ${CIRCLE_SHA1}" | tee ~/my_test_artifacts/root_artifact.md
      - run: npm test
      - store_artifacts:
          path: ~/my_test_artifacts
          destination: test_artifacts
